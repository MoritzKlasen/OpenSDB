user  nginx;
worker_processes auto;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  server_tokens off;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

  upstream opensdb_web {
    server web:8001;
    keepalive 16;
  }

  # HTTP -> HTTPS redirect
  server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # HTTPS server
  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    ssl_certificate     /etc/nginx/certs/opensdb.crt;
    ssl_certificate_key /etc/nginx/certs/opensdb.key;
    include /etc/nginx/ssl_params.conf;

    # Security headers
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # API routes - no caching
    location /api/ {
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Connection        "";
      proxy_pass http://opensdb_web;
      proxy_cache_bypass 1;
      proxy_no_cache 1;
    }

    # Static assets with long cache (versioned)
    location ~ \.(js|css|woff2|ttf|png|jpg|svg)$ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_pass http://opensdb_web;
      expires 30d;
      add_header Cache-Control "public";
    }

    # Other static assets
    location ~ ^/assets/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_pass http://opensdb_web;
      expires 30d;
      add_header Cache-Control "public";
    }

    # WebSocket connections
    location /ws {
      proxy_http_version 1.1;
      proxy_pass http://opensdb_web;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        "upgrade";
      proxy_read_timeout                 86400;
      proxy_send_timeout                 86400;
    }

    # SPA: catch-all for client-side routing
    location / {
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Connection        "";
      proxy_pass http://opensdb_web;
      
      # Cache HTML for 1h with validation
      expires 1h;
      add_header Cache-Control "public, must-revalidate";
    }
  }
}
